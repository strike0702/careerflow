spring:
  datasource:
    url: jdbc:h2:mem:interview_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: localhost:9092

careerflow:
  clients:
    application-service:
      url: http://localhost:8083
  events:
    kafka:
      enabled: false
