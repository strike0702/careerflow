server:
  port: 9000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
        - id: resume-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/resumes/**
        - id: application-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/applications/**
        - id: interview-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/interviews/**

management:
  endpoints:
    web:
      exposure:
        include: health, info
