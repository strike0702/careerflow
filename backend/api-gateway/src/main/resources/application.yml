server:
  port: ${SERVER_PORT:9000}

spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            exposedHeaders:
              - X-Request-ID
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
        - id: resume-service
          uri: ${RESUME_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/resumes/**
        - id: application-service
          uri: ${APPLICATION_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/applications/**
        - id: interview-service
          uri: ${INTERVIEW_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/interviews/**

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    reactor.netty: WARN
